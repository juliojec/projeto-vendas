spring:
  application:
    name: vendas-api

  datasource:
    url: jdbc:postgresql://postgres:5432/vendas
    username: vendas_user
    password: vendas_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  aop:
    auto: true
    proxy-target-class: true

server:
  error:
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus,loggers"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        descriptions: true
    web:
      server:
        request:
          autotime:
            enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.50, 0.90, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 200ms, 500ms, 1s, 2s

logging:
  level:
    root: INFO
    com.projeto.vendas: INFO
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql: OFF
    org.hibernate.tool.hbm2ddl: OFF
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/vendas-api.log
    max-size: 10MB
    max-history: 30